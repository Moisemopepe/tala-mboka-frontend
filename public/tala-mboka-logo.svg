<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Tala Mboka Crisis</title>
  <desc id="desc">Real-time crisis mapping logo with map pin, red alert signal, and Tala Mboka Crisis text.</desc>
  <defs>
    <linearGradient id="bluePin" x1="360" y1="170" x2="685" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07366f"/>
      <stop offset="1" stop-color="#001f4f"/>
    </linearGradient>
    <linearGradient id="redSignal" x1="660" y1="120" x2="945" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff2635"/>
      <stop offset="1" stop-color="#d70f1e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" rx="80" fill="#fff"/>
  <ellipse cx="575" cy="720" rx="155" ry="22" fill="#0f172a" opacity=".16"/>
  <path filter="url(#shadow)" d="M575 150c-151 0-274 122-274 273 0 209 274 430 274 430s274-221 274-430c0-151-123-273-274-273Z" fill="url(#bluePin)"/>
  <circle cx="575" cy="424" r="151" fill="#fff"/>
  <circle cx="575" cy="424" r="86" fill="none" stroke="#09265a" stroke-width="47"/>
  <circle cx="575" cy="424" r="47" fill="#ed1724"/>
  <path d="M685 187c97 22 174 99 196 196" fill="none" stroke="url(#redSignal)" stroke-width="30" stroke-linecap="round"/>
  <path d="M703 267c57 19 102 64 121 121" fill="none" stroke="url(#redSignal)" stroke-width="30" stroke-linecap="round"/>
  <path d="M722 346c20 9 36 25 45 45" fill="none" stroke="url(#redSignal)" stroke-width="30" stroke-linecap="round"/>
  <text x="600" y="875" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="122" font-weight="900" letter-spacing="9" fill="#062653">TALA MBOKA</text>
  <path d="M150 962h205M845 962h205" stroke="#062653" stroke-width="8"/>
  <text x="600" y="990" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="36" fill="#ed1724">CRISIS</text>
  <text x="600" y="1062" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="18" fill="#424955">REAL-TIME CRISIS MAPPING</text>
</svg>
